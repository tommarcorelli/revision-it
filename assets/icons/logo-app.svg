<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Révision IT">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#132049"/>
      <stop offset="0.55" stop-color="#0b1024"/>
      <stop offset="1" stop-color="#050814"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Fond PLEIN CADRE -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Cadre néon dans la zone de sécurité -->
  <rect x="52" y="52" width="408" height="408" rx="76" fill="none" stroke="url(#edge)" stroke-width="8" opacity="0.85"/>
  <!-- points de circuit -->
  <g fill="#60a5fa">
    <circle cx="96" cy="96" r="5"/><circle cx="416" cy="96" r="5"/>
    <circle cx="96" cy="416" r="5"/><circle cx="416" cy="416" r="5"/>
  </g>
  <g stroke="#60a5fa" stroke-width="4" opacity="0.5" stroke-linecap="round">
    <path d="M96 118 V150"/><path d="M416 118 V150"/>
  </g>

  <!-- Monogramme IT, centré, néon -->
  <g fill="url(#ink)" filter="url(#neon)">
    <!-- I -->
    <rect x="150" y="150" width="40" height="188" rx="8"/>
    <rect x="132" y="150" width="76" height="26" rx="8"/>
    <rect x="132" y="312" width="76" height="26" rx="8"/>
    <!-- T -->
    <rect x="228" y="150" width="152" height="30" rx="8"/>
    <rect x="286" y="150" width="36" height="188" rx="8"/>
  </g>

  <!-- prompt terminal : curseur cyan centré sous le monogramme -->
  <rect x="196" y="356" width="120" height="22" rx="5" fill="#22d3ee" filter="url(#neon)"/>
</svg>
