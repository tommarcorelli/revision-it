<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" data-testid="brand-logo">
  <defs>
    <linearGradient id="lg1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="55%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0" y1="0" x2="0" y2="64">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity=".05"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#0A0F1E" stroke="url(#lg1)" stroke-width="1.5"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#lg2)"/>
  <!-- circuit dots -->
  <circle cx="10" cy="10" r="1.2" fill="#60A5FA"/>
  <circle cx="54" cy="10" r="1.2" fill="#60A5FA"/>
  <circle cx="10" cy="54" r="1.2" fill="#60A5FA"/>
  <circle cx="54" cy="54" r="1.2" fill="#60A5FA"/>
  <!-- I -->
  <rect x="18" y="20" width="6" height="24" rx="1.5" fill="url(#lg1)"/>
  <!-- T -->
  <rect x="28" y="20" width="20" height="6" rx="1.5" fill="url(#lg1)"/>
  <rect x="35" y="22" width="6" height="22" rx="1.5" fill="url(#lg1)"/>
  <!-- prompt underline -->
  <path d="M14 50 L20 50" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M22 50 L26 50" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
</svg>
